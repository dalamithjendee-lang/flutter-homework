<!doctype html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ຄຳຕອບ Flutter — 120 ຂໍ້</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d1117;
        --bg-soft: #161b22;
        --card: #1a2029;
        --card-hi: #212a35;
        --line: #2a323d;
        --ink: #e6edf3;
        --ink-dim: #9aa7b4;
        --ink-faint: #6b7785;
        --accent: #42a5f5; /* flutter blue */
        --accent-2: #0468d7;
        --accent-soft: rgba(66, 165, 245, 0.14);
        --good: #3fb950;
        --good-soft: rgba(63, 185, 80, 0.13);
        --code-bg: #0a0e14;
        --warn: #e3b341;
        --radius: 16px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Noto Sans Lao", system-ui, sans-serif;
        background:
          radial-gradient(
            1200px 600px at 12% -8%,
            rgba(66, 165, 245, 0.1),
            transparent 60%
          ),
          radial-gradient(
            900px 500px at 100% 0%,
            rgba(4, 104, 215, 0.1),
            transparent 55%
          ),
          var(--bg);
        color: var(--ink);
        line-height: 1.75;
        -webkit-font-smoothing: antialiased;
      }
      ::selection {
        background: var(--accent-soft);
      }

      /* ---------- HEADER ---------- */
      header.hero {
        padding: 54px 24px 30px;
        text-align: center;
        border-bottom: 1px solid var(--line);
        position: relative;
        overflow: hidden;
      }
      header.hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 48px 48px;
        -webkit-mask-image: radial-gradient(
          circle at 50% 0%,
          #000,
          transparent 70%
        );
        mask-image: radial-gradient(circle at 50% 0%, #000, transparent 70%);
        opacity: 0.4;
        pointer-events: none;
      }
      .badge {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 13px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
        background: var(--accent-soft);
        border: 1px solid rgba(66, 165, 245, 0.3);
        padding: 6px 14px;
        border-radius: 999px;
        margin-bottom: 20px;
      }
      .badge svg {
        width: 15px;
        height: 15px;
      }
      header.hero h1 {
        position: relative;
        font-size: clamp(28px, 5vw, 46px);
        font-weight: 800;
        letter-spacing: -0.01em;
        line-height: 1.25;
        background: linear-gradient(180deg, #fff, #b9d6f5);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      header.hero p.sub {
        position: relative;
        color: var(--ink-dim);
        margin-top: 12px;
        font-size: 16px;
      }
      .stats {
        position: relative;
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 26px;
      }
      .stat {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 22px;
        min-width: 104px;
      }
      .stat b {
        display: block;
        font-family: "Space Grotesk", sans-serif;
        font-size: 26px;
        color: var(--accent);
      }
      .stat span {
        font-size: 13px;
        color: var(--ink-faint);
      }

      /* ---------- TOOLBAR ---------- */
      .toolbar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(13, 17, 23, 0.82);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--line);
        padding: 12px 24px;
      }
      .toolbar-inner {
        max-width: 880px;
        margin: 0 auto;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .search {
        flex: 1;
        min-width: 200px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--bg-soft);
        border: 1px solid var(--line);
        border-radius: 11px;
        padding: 10px 14px;
        transition: border-color 0.2s;
      }
      .search:focus-within {
        border-color: var(--accent);
      }
      .search svg {
        width: 18px;
        height: 18px;
        color: var(--ink-faint);
        flex-shrink: 0;
      }
      .search input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--ink);
        font-family: inherit;
        font-size: 15px;
      }
      .search input::placeholder {
        color: var(--ink-faint);
      }
      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        background: var(--bg-soft);
        border: 1px solid var(--line);
        border-radius: 11px;
        padding: 10px 16px;
        cursor: pointer;
        user-select: none;
        font-size: 14px;
        color: var(--ink-dim);
        transition: 0.2s;
        white-space: nowrap;
      }
      .toggle:hover {
        border-color: var(--accent);
      }
      .toggle.on {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent);
      }
      .switch {
        width: 36px;
        height: 20px;
        border-radius: 99px;
        background: var(--line);
        position: relative;
        transition: 0.2s;
        flex-shrink: 0;
      }
      .toggle.on .switch {
        background: var(--accent);
      }
      .switch::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        transition: 0.2s;
      }
      .toggle.on .switch::after {
        left: 18px;
      }

      /* ---------- LAYOUT ---------- */
      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 40px 24px 120px;
      }

      .section {
        margin-bottom: 48px;
        scroll-margin-top: 88px;
      }
      .section-head {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 22px;
      }
      .section-num {
        font-family: "Space Grotesk", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: var(--bg);
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        box-shadow: 0 4px 14px rgba(66, 165, 245, 0.3);
      }
      .section-head h2 {
        font-size: 20px;
        font-weight: 700;
        line-height: 1.3;
      }
      .section-head h2 small {
        display: block;
        font-size: 13px;
        color: var(--ink-faint);
        font-weight: 500;
        margin-top: 2px;
        letter-spacing: 0.02em;
      }

      /* ---------- CARDS ---------- */
      .q {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 24px;
        margin-bottom: 14px;
        transition:
          border-color 0.2s,
          transform 0.2s;
      }
      .q:hover {
        border-color: #384452;
      }
      .q-head {
        display: flex;
        gap: 14px;
        align-items: flex-start;
      }
      .q-no {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 14px;
        color: var(--accent);
        background: var(--accent-soft);
        border-radius: 9px;
        min-width: 34px;
        height: 30px;
        padding: 0 9px;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .q-text {
        font-weight: 600;
        font-size: 16.5px;
        color: var(--ink);
      }
      .q-text code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.86em;
        background: var(--bg-soft);
        padding: 1px 6px;
        border-radius: 6px;
        color: #9ecbff;
      }
      ul.opts {
        list-style: none;
        margin: 16px 0 0;
        display: grid;
        gap: 8px;
      }
      ul.opts li {
        display: flex;
        gap: 11px;
        align-items: flex-start;
        padding: 10px 13px;
        border-radius: 10px;
        border: 1px solid transparent;
        background: var(--bg-soft);
        font-size: 15px;
        color: var(--ink-dim);
        transition: 0.2s;
      }
      ul.opts li .key {
        font-weight: 600;
        color: var(--ink-faint);
        flex-shrink: 0;
        font-family: "Space Grotesk", sans-serif;
      }
      ul.opts li code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.88em;
        color: #9ecbff;
      }
      /* reveal answer */
      .reveal ul.opts li.correct {
        background: var(--good-soft);
        border-color: rgba(63, 185, 80, 0.4);
        color: var(--ink);
      }
      .reveal ul.opts li.correct .key {
        color: var(--good);
      }
      .reveal ul.opts li.correct::after {
        content: "✓";
        margin-left: auto;
        color: var(--good);
        font-weight: 700;
        flex-shrink: 0;
      }
      .explain {
        margin-top: 14px;
        border-left: 3px solid var(--accent);
        background: linear-gradient(90deg, var(--accent-soft), transparent);
        padding: 11px 16px;
        border-radius: 0 10px 10px 0;
        font-size: 14.5px;
        color: var(--ink-dim);
        display: none;
      }
      .reveal .explain {
        display: block;
      }
      .explain b {
        color: var(--ink);
      }
      .explain code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.88em;
        background: var(--bg-soft);
        padding: 1px 6px;
        border-radius: 5px;
        color: #9ecbff;
      }

      /* hidden-mode hint */
      .tap-hint {
        margin-top: 14px;
        font-size: 13px;
        color: var(--ink-faint);
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .reveal .tap-hint {
        display: none;
      }
      .q.practical .tap-hint {
        display: none;
      }

      /* ---------- PRACTICAL ---------- */
      .q.practical .answer {
        margin-top: 16px;
        display: block;
      }
      pre {
        background: var(--code-bg);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px 18px;
        overflow-x: auto;
        font-family: "JetBrains Mono", monospace;
        font-size: 13.5px;
        line-height: 1.7;
        color: #c9d1d9;
        margin-top: 4px;
      }
      pre .kw {
        color: #ff7b72;
      }
      pre .ty {
        color: #79c0ff;
      }
      pre .st {
        color: #a5d6ff;
      }
      pre .cm {
        color: #8b949e;
        font-style: italic;
      }
      pre .fn {
        color: #d2a8ff;
      }
      .note {
        font-size: 14.5px;
        color: var(--ink-dim);
        margin-top: 10px;
      }
      .note code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.88em;
        background: var(--bg-soft);
        padding: 1px 6px;
        border-radius: 5px;
        color: #9ecbff;
      }

      .footnote {
        margin-top: 30px;
        padding: 16px 20px;
        border: 1px dashed var(--line);
        border-radius: 12px;
        background: rgba(227, 179, 65, 0.06);
        font-size: 14px;
        color: var(--ink-dim);
      }
      .footnote b {
        color: var(--warn);
      }

      .empty {
        display: none;
        text-align: center;
        color: var(--ink-faint);
        padding: 60px 0;
        font-size: 16px;
      }

      /* back to top */
      #top {
        position: fixed;
        bottom: 26px;
        right: 26px;
        z-index: 60;
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        border: none;
        cursor: pointer;
        color: #fff;
        display: grid;
        place-items: center;
        box-shadow: 0 8px 24px rgba(4, 104, 215, 0.4);
        opacity: 0;
        pointer-events: none;
        transition: 0.3s;
      }
      #top.show {
        opacity: 1;
        pointer-events: auto;
      }
      #top svg {
        width: 22px;
        height: 22px;
      }

      @media (max-width: 560px) {
        main {
          padding: 28px 16px 110px;
        }
        .q {
          padding: 18px 16px;
        }
        header.hero {
          padding: 40px 18px 24px;
        }
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <span class="badge">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M14.3 0L2.3 12l3.7 3.7L21.7 0h-7.4zm.1 11.3l-6.5 6.5 3.7 3.7 3.3-3.3L21.7 12h-7.3z"
          />
        </svg>
        Flutter Quiz
      </span>
      <h1>ຄຳຕອບ ການພັດທະນາ Application ດ້ວຍ Flutter</h1>
      <p class="sub">
        ສະຫຼຸບຄຳຕອບ ແລະ ຄຳອະທິບາຍ — ພາກທິດສະດີ 100 ຂໍ້ + ພາກປະຕິບັດ 20 ຂໍ້
      </p>
      <div class="stats">
        <div class="stat"><b>100</b><span>ຂໍ້ເລືອກຕອບ</span></div>
        <div class="stat"><b>20</b><span>ຂໍ້ປະຕິບັດ</span></div>
        <div class="stat"><b>9</b><span>ພາກ</span></div>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-inner">
        <label class="search">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="7" />
            <path d="M21 21l-4.3-4.3" />
          </svg>
          <input
            id="search"
            type="text"
            placeholder="ຄົ້ນຫາຄຳຖາມ ຫຼື keyword (ເຊັ່ນ ListView, Drawer)..."
          />
        </label>
        <div class="toggle on" id="modeToggle">
          <span class="switch"></span>
          <span id="modeLabel">ສະແດງຄຳຕອບ</span>
        </div>
      </div>
    </div>

    <main id="content"></main>
    <div class="empty" id="empty">ບໍ່ພົບຄຳຖາມທີ່ກົງກັບການຄົ້ນຫາ</div>

    <button id="top" aria-label="ກັບຂຶ້ນເທິງ">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <path d="M12 19V5M5 12l7-7 7 7" />
      </svg>
    </button>

    <script>
      // ============ DATA ============
      const sections = [
        {
          title: "ພື້ນຖານ Widget ແລະ TextField",
          sub: "ຂໍ້ 1 – 10",
          items: [
            {
              n: 1,
              q: "ListTile ປະກອບດ້ວຍສາມສ່ວນຫຼັກໃດ?",
              o: [
                "leading, title, trailing",
                "leading, title, actions",
                "trailing, leading, title",
                "trailing, title, actions",
              ],
              a: 0,
              e: "<b>leading</b> = ສ່ວນຊ້າຍ (ມັກເປັນ Icon/ຮູບ), <b>title</b> = ຂໍ້ຄວາມຫຼັກໃນກາງ, <b>trailing</b> = ສ່ວນຂວາສຸດ.",
            },
            {
              n: 2,
              q: "TextEditingController ໃຊ້ຈັບຄູ່ກັບ Widget ໃດ?",
              o: ["Text", "Button", "TextField", "ListView"],
              a: 2,
              e: "ໃຊ້ຄວບຄຸມ ແລະ ອ່ານຄ່າຂໍ້ຄວາມຂອງ TextField ຜ່ານ <code>controller.text</code>.",
            },
            {
              n: 3,
              q: "Event ໃດໃຊ້ກວດສອບ input ທາງ Keyboard ໃນ TextField (ທຸກຄັ້ງທີ່ພິມ)?",
              o: ["onChanged", "onSubmitted", "onPress", "textChange"],
              a: 0,
              e: "<code>onChanged</code> ຖືກເອີ້ນທຸກໆຄັ້ງທີ່ຄ່າຂໍ້ຄວາມປ່ຽນແປງ.",
            },
            {
              n: 4,
              q: "Event ໃດເຮັດວຽກເມື່ອກົດປຸ່ມ Enter?",
              o: ["onChanged", "onSubmitted", "onPress", "textChange"],
              a: 1,
              e: "<code>onSubmitted</code> ຖືກເອີ້ນເມື່ອກົດ Enter/Done.",
            },
            {
              n: 5,
              q: "Super class ສຳລັບການສະແດງຄ່າຄົງທີ່ (Static)?",
              o: [
                "StatelessWidget",
                "StatefulWidget",
                "MaterialApp",
                "Scaffold",
              ],
              a: 0,
              e: "StatelessWidget ໃຊ້ກັບໜ້າທີ່ບໍ່ມີການປ່ຽນແປງ state ພາຍໃນ.",
            },
            {
              n: 6,
              q: "Widget ຫຼັກໃນການອອກແບບໂຄງສ້າງໜ້າຕ່າງ Application?",
              o: [
                "StatelessWidget",
                "StatefulWidget",
                "MaterialApp",
                "Scaffold",
              ],
              a: 3,
              e: "Scaffold ໃຫ້ໂຄງສ້າງພື້ນຖານ Material: appBar, body, drawer, FAB ແລະ ອື່ນໆ.",
            },
            {
              n: 7,
              q: "Library Package ສຳລັບ Material Design?",
              o: [
                "Material.dart",
                "Rendering.dart",
                "http.dart",
                "Container.dart",
              ],
              a: 0,
              e: "ນຳເຂົ້າດ້ວຍ <code>import 'package:flutter/material.dart';</code>",
            },
            {
              n: 8,
              q: "ຈັດ Widget ຕາມລວງນອນ (Horizontal)?",
              o: ["Columns", "Row", "Center", "Container"],
              a: 1,
              e: "Row ຈັດ Widget ລູກໆ ຈາກຊ້າຍໄປຂວາ.",
            },
            {
              n: 9,
              q: "ຈັດ Widget ຕາມລວງຕັ້ງ (Vertical)?",
              o: ["Columns", "Row", "Center", "Container"],
              a: 0,
              e: "Column ຈັດ Widget ລູກໆ ຈາກເທິງລົງລຸ່ມ.",
            },
            {
              n: 10,
              q: "itemCount ໃນ ListView ໃຊ້ເພື່ອຫຍັງ?",
              o: [
                "ຈຳນວນລາຍການສະແດງ",
                "ຈຳນວນ ListView",
                "ຈຳນວນຂໍ builder",
                "ຈຳນວນ Content",
              ],
              a: 0,
              e: "ບອກວ່າຈະສ້າງ item ທັງໝົດຈັກອັນ.",
            },
          ],
        },
        {
          title: "AppBar, Drawer ແລະ Navigation",
          sub: "ຂໍ້ 11 – 20",
          items: [
            {
              n: 11,
              q: "Property ໃນ Scaffold ສຳລັບສ້າງເມນູດ້ານຂ້າງ (Side Menu)?",
              o: ["drawer", "sideBar", "appBar", "bottomMenu"],

      const root = content;
      const modeToggle = document.getElementById("modeToggle");
      const modeLabel = document.getElementById("modeLabel");
      let revealAll = true;

      function applyReveal() {
        document.querySelectorAll(".q").forEach((q) => {
          if (revealAll) q.classList.add("reveal");
          else q.classList.remove("reveal");
        });
        modeToggle.classList.toggle("on", revealAll);
        modeLabel.textContent = revealAll ? "ສະແດງຄຳຕອບ" : "ໂໝດທົບທວນ";
      }
      applyReveal();

      modeToggle.addEventListener("click", () => {
        revealAll = !revealAll;
        applyReveal();
      });

      // tap a single card to reveal (works in review mode)
      root.addEventListener("click", (e) => {
        const q = e.target.closest(".q");
        if (!q) return;
        if (!revealAll) q.classList.toggle("reveal");
      });

      // search
      const search = document.getElementById("search");
      const empty = document.getElementById("empty");
      search.addEventListener("input", () => {
        const term = search.value.trim().toLowerCase();
        let anyVisible = false;
        document.querySelectorAll("[data-q]").forEach((q) => {
          const match = !term || q.dataset.text.includes(term);
          q.style.display = match ? "" : "none";
          if (match) anyVisible = true;
        });
        document.querySelectorAll("[data-sec]").forEach((sec) => {
          const visible = [...sec.querySelectorAll("[data-q]")].some(
            (q) => q.style.display !== "none",
          );
          sec.style.display = visible ? "" : "none";
        });
        empty.style.display = anyVisible ? "none" : "block";
      });

      // back to top
      const topBtn = document.getElementById("top");
      window.addEventListener("scroll", () => {
        topBtn.classList.toggle("show", window.scrollY > 600);
      });
      topBtn.addEventListener("click", () =>
        window.scrollTo({ top: 0, behavior: "smooth" }),
      );
